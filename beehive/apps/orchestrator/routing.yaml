rules:
  - match:
      tipo: handoff-executavel
      destinatario: copilot-hive
    action: dispatch_to_copilot_hive
  - match:
      tipo: handoff-executavel
      destinatario: copilot-tos
    action: dispatch_to_copilot_tos
  - match:
      tipo: handoff-executavel
      destinatario: copilot
    action: dispatch_to_copilot
  - match:
      tipo: pedido-de-parecer
      destinatario: claude
    action: notify_claude
  - match:
      source: copilot
      pattern: "^COPILOT-"
    action: notify_claude
  - match:
      source: gemini
      pattern: "^GEMINI-"
    action: notify_claude
  - match:
      source: marcio
      tipo: handoff-executavel
    action: dispatch_to_copilot
  - default: pause_and_escalate
