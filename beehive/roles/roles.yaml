# beehive/roles/roles.yaml
# Governança Global do Hive Framework — Revisado 2026-05-26
#
# Os 4 atores do squad:
#   Márcio        → Owner. Aprova tudo via The Gate. Único com autoridade de commit.
#   Gemini (Lead) → Orquestrador. Opera em 3 modos: PO, Projetista, Tech Lead.
#   Claude        → Arquiteto. Filtro técnico entre intenção e execução.
#   Copilot       → Engenheiro. Implementa contratos fechados. Não decide design.

hive:
  name: "Hive Framework"
  owner: "Márcio"
  currency: "BRL"

agents:

  gemini:
    role: "Squad Lead / Orquestrador"
    description: "Opera em 3 modos via cartuchos: PO, Projetista, Tech Lead. Visão total do repositório."
    capabilities:
      can_orchestrate: true
      can_veto: true              # Pode barrar Claude/Copilot por violação de contrato
      can_read_all: true          # Visão total do framework e do produto
      can_write_config: true
    models:
      # Valores de referência — versões reais dependem da API disponível no momento
      complex: "gemini-1.5-pro"   # Orquestração, estratégia, governança
      routine: "gemini-1.5-flash" # Triagem, automação, documentação derivada
    cartuchos:
      - po          # beehive/roles/po.md
      - projetista  # beehive/roles/projetista.md
      - tech-lead   # beehive/roles/tech-lead.md

  claude:
    role: "Arquiteto / Estrategista"
    description: "Filtro técnico. Todo debate arquitetural passa pelo Claude antes de chegar ao Copilot."
    model: "claude-sonnet-4-6"
    capabilities:
      can_design_blueprints: true
      can_read_product: true
      can_write_framework_docs: true   # Blueprints, Work Orders, documentação de framework
      can_write_product_code: false    # Código de produto é responsabilidade do Copilot
      can_execute_brainstorm: true
    escalation_path: "Gemini"
    inbox: "beehive/construcao/inbox-claude.md"
    reference: "beehive/.claude/CLAUDE.md"

  copilot:
    role: "Engenheiro de Software / Executor"
    description: "Implementa contratos fechados. Não redefine escopo, não toma decisões de design."
    model: "gpt-4o"               # Versão real pode variar conforme plano
    capabilities:
      can_implement: true
      can_execute_tests: true
      can_write_product_code: true
      can_read_task_context: true  # Lê apenas o que o contrato e o inbox especificam
    escalation_path: "Claude"     # Dúvida técnica → Claude. Dúvida de negócio → Gemini/Márcio
    inbox: "beehive/construcao/inbox-copilot.md"
    reference: "beehive/.copilot/COPILOT.md"

rules:
  context_caching: true           # Ativa economia via cache nas APIs que suportam
  enforce_contracts: true         # Gemini DEVE barrar se implementação fugir do contrato
  gate_required: true             # Nenhum commit sem OK explícito do Márcio
  telemetry_log: "beehive/registry/telemetria/custos.log"
