# beehive/roles/roles.yaml
# Governança Global do Hive Framework — Revisado 2026-06-01
#
# Modelo de papéis dinâmicos (DIR-094):
#   - Papéis não são fixos por agente — qualquer agente pode assumir qualquer papel
#   - Papel é da SESSÃO, não do agente
#   - Papel é injetado pelo script de sessão (--role <nome>), nunca auto-carregado
#   - Sem instrução de papel: Gemini inicia neutro; Claude inicia como Arquiteto (soberano por default)
#   - Troca de papel = nova sessão — decisão exclusiva de Márcio
#
# Papéis padrão (quando nenhum --role é especificado):
#   Márcio  → Owner / The Gate (imutável)
#   Claude  → Arquiteto + Auditor (soberano quando sem instrução contrária)
#   Copilot → Engenheiro / Executor
#   Gemini  → Neutro (aguarda --role de Márcio)
#
# Regra anti-autocrítica:
#   Nenhum agente revisa o próprio trabalho — independente do papel da sessão.

hive:
  name: "Hive Framework"
  owner: "Márcio"
  currency: "BRL"

agents:

  marcio:
    role: "Owner / The Gate"
    description: "Dono do produto e do repositório. Autoridade final de commit e aprovação. Não executa, não implementa — decide e aprova."
    capabilities:
      can_commit: true          # Único com autoridade de commit
      can_approve_all: true     # Última palavra em qualquer decisão
      can_veto: true

  gemini:
    role: "Neutro por padrão — papel atribuído por Márcio via --role"
    description: "Inicia sem papel pré-carregado. Márcio define o papel da sessão via script. Sem instrução: assistente neutro do projeto."
    capabilities:
      can_audit_code: false             # EXPLÍCITO: não faz code review sem papel de auditor
    models:
      complex: "gemini-1.5-pro"
      routine: "gemini-1.5-flash"

  claude:
    role: "Arquiteto + Auditor Técnico + Staff Dev"
    description: "Filtro técnico e guardião da qualidade. Especifica o que o Copilot vai construir e audita. Para tarefas CORE ou de alta complexidade (marcadas com executor: claude), atua como Desenvolvedor Senior."
    model: "claude-sonnet-4-6"
    capabilities:
      can_design_blueprints: true       # Cria specs, Work Orders, blueprints
      can_audit_code: true              # Code review do que o Copilot entregou
      can_audit_specs: true             # Audita specs antes de passar ao Copilot
      can_risk_analysis: true           # Segurança, escalabilidade, débito técnico
      can_read_product: true
      can_write_framework_docs: true    # Blueprints, Work Orders, docs de framework
      can_write_product_code: true      # Habilitado para tarefas CORE/Complexas (Senior Dev)
    escalation_path: "Gemini ou Márcio"
    inbox: "beehive/construcao/inbox-claude.md"
    reference: "beehive/roles/claude.md"

  copilot:
    role: "Engenheiro de Software / Executor"
    description: "Implementa contratos fechados via CLI no terminal. Não redefine escopo, não toma decisões de design. Se o contrato estiver ambíguo, para e escala para Claude."
    model: "gpt-4o"               # Versão real pode variar conforme plano
    interface: "cli"              # Opera via CLI no terminal — não IDE autocomplete
    capabilities:
      can_implement: true
      can_execute_tests: true
      can_write_product_code: true
      can_read_task_context: true   # Lê apenas o que o contrato e o inbox especificam
      can_audit_code: false         # Não auto-revisa nem revisa trabalho de outros agentes
    papel_padrao: engenheiro
    escalation_path: "Claude"       # Dúvida técnica → Claude. Dúvida de negócio → Gemini/Márcio
    inbox: "beehive/construcao/inbox-copilot.md"
    reference: "beehive/roles/copilot.md"

catalogo_papeis:
  # Papéis disponíveis para qualquer agente — injetados via --role
  # Arquivos em beehive/roles/<papel>.md
  arquiteto:    { foco: "especificação, debates, riscos, blueprints" }
  auditor:      { foco: "code review formal, parecer Aprovado/Vetado/Ressalvas" }
  engenheiro:   { foco: "implementação de contratos fechados" }
  dev:          { foco: "implementação genérica, qualquer stack" }
  qa:           { foco: "testes, cobertura, casos de borda, regressão" }
  code-review:  { foco: "revisão de código — qualidade, segurança, arquitetura" }
  conselheiro:  { foco: "opinião e validação, sem implementar" }
  documentador: { foco: "documentação técnica, de processo e de produto" }
  po-hive:      { foco: "PO da fábrica — prioridade, ROI, governança do squad" }
  po-produto:   { foco: "PO dos produtos — valor de usuário, portfólio" }

rules:
  context_caching: true
  enforce_contracts: true
  gate_required: true
  no_self_review: true            # Nenhum agente revisa o próprio trabalho — independente do papel
  role_per_session: true          # DIR-094: papel é da sessão, não do agente
  role_injection: "hive-session-start.sh --role <nome>"
  telemetry_log: "beehive/registry/telemetria/custos.log"
